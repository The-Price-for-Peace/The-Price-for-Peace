l_english:
 sov_dem1:0 "Liberty have arrived"
 sov_dem1_desc:0 "after the reformist lead communists colapsed and brought union with itself. from what remains of the Russian soviet socialist republic is here with democracy. for the next few years the shock therapy and privatization will make our industry better then it ever was before."
 sov_dem2:0 "The shock therapy"
 sov_dem2_desc:0 "It might not be good. but we need to do it fast soo we can minimize the chance of failing it"
 sov_dem3:0 "privatization"
 sov_dem3_desc:0 "its time for privatization, sell all the state and goverment owned organizations to private people"
 sov_dem4:0 "hell let loose"
 sov_dem4_desc:0 "we fucked up. our economy colapsed. rioting became daily. we have to do something about it."
 sov_dem5:0 "call in the army"
 sov_dem5_desc:0 "use the army to attempt to stop riots"
 sov_dem6:0 "spread fake news"
 sov_dem6_desc:0 "spread fake news on our economy. it may help. or not"
 sov_dem7:0 "help the oligarchy"
 sov_dem7_desc:0 "with the privatization and shock therapy we got some rich russian people.. well. trying to buy everything."
 sov_dem8:0 "request imf to help"
 sov_dem8_desc:0 "our economy might get help from the imf" 
 sov_dem9:0 "Supress the democratic elements"
 sov_dem9_desc:0 "the duma wants to stop our economic reforms. which they say "its a way to get the west to own the country" but the west would never dare to do it. right?"
 sov_dem10:0 "shell the duma"
 sov_dem10_desc:0 "the duma is. too strong. we cannot reform the economy. soo we should get them out of here."
 sov_dem11:0 "accept the imf demands"
 sov_dem11_desc:0 "the imf is harsh. but we need to accept it."
 sov_dem12:0 "start liberlization"
 sov_dem12_desc:0 "liberalism's core points are freedom. we will slowly turn liberal." 
 sov_dem13:0 "expand freedom of speech"
 sov_dem13_desc:0 "freedom of speech is limited currently. maybe we can make people calm down easier if we allow them to talk."
 sov_dem14:0 "freedom of religion"
 sov_dem14_desc:0 "in the time of the soviet union religions were oppresed. now lets improve the situation with complete freedom."
 sov_dem15:0 "rename cities"
 sov_dem15_desc:0 "rename the big cities like leningrad to their old pre communist names."
 sov_dem16:0 "fight the russian maffia"
 sov_dem16_desc:0 "after the colapse the russian mafia took the opportunity and became a huge crime group."
 sov_dem17:0 "Move into chechnia"
 sov_dem17_desc:0 "chechnia declared independence while the unionc colapsed. lets try to get them back"
 sov_dem18:0 "reform the parlament"
 sov_dem18_desc:0 "parliament after the soviet times is very corrupt and heavily biased. maybe some reforms help"
 sov_dem19:0 "Step in with price controls"
 sov_dem19_desc:0 "the wages are not enough for people to buy basic things like food"
 sov_dem20:0 "increase wages"
 sov_dem20_desc:0 "maybe some wage increase helps. maybe."
 sov_dem21:0 "Fight chechen separatists inside the motherland"
 sov_dem21_desc:0 "the chechens have a supprisingly big base of supporters in russia. including terrorists. before anything happens we have to find them"
 sov_dem22:0 "Hell to the cities"
 sov_dem22_desc:0 "Those god damn Cities and the chechens making it almost imposible to advance. Make the buildings equal to the ground"
 sov_dem23:0 "Fight terrorism"
 sov_dem23_desc:0 "Those damn chechens started commiting terrorism against us"
 sov_dem24:0 "Elections"
 sov_dem24_desc:0 "our biggest oponent the Communist party, we are willing to do almost anything in order to win. WE cannot let them get back here again"
 sov_dem25:0 "For grozny"
 sov_dem25_desc:0 "Grozny the capital of chechia. if we capture it we should win this war.. we hope."
 sov_dem26:0 "Democracy won"
 sov_dem26_desc:0 "we managed to beat our oponents"
 sov_dem27:0 "improve our army"
 sov_dem27_desc:0 "we can see how well we perform in chechnia. we need to reform very fast"
 sov_dem28:0 "reform our infantry tactics"
 sov_dem28_desc:0 "due to enemy assymetric warfare we need to match them in our infantry"
 sov_dem29:0 "reform urban warfare with tanks"
 sov_dem29_desc:0 "we use big column formations against guys with rpgs in the 10th story in narrow streets. lets change that."
 sov_dem30:0 "reform our artillery"
 sov_dem30_desc:0 "our artillery is not that bad but we need to use it more efficiently"
 sov_dem31:0 "T90"
 sov_dem31_desc:0 "lets deploy our newest tank the t90A"
 sov_dem32:0 "get out the older tanks from reserve"
 sov_dem32_desc:0 "even though they are older they use the same gun, we can use older ones as indirect fire support maybe"
 sov_dem33:0 "improve our close quarters fighting"
 sov_dem33_desc:0 "we need to match those guys in the cities"